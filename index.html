<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>排序演算法教學中心</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: 3.5rem;
      color: #7eb8f7;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(126, 184, 247, 0.3);
      animation: fadeInDown 0.8s ease;
    }

    .subtitle {
      font-size: 1.3rem;
      color: #aaa;
      margin-bottom: 40px;
      line-height: 1.6;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    .description {
      background: rgba(26, 26, 46, 0.8);
      border: 1px solid rgba(126, 184, 247, 0.3);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
      line-height: 1.8;
      animation: fadeInUp 0.8s ease 0.4s both;
    }

    .description h2 {
      color: #7eb8f7;
      font-size: 1.3rem;
      margin-bottom: 15px;
    }

    .description p {
      color: #bbb;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease 0.6s both;
    }

    .feature {
      background: rgba(74, 144, 217, 0.1);
      border: 1px solid rgba(126, 184, 247, 0.3);
      border-radius: 8px;
      padding: 15px;
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .feature-text {
      color: #bbb;
      font-size: 0.9rem;
    }

    .start-btn {
      display: inline-block;
      padding: 16px 50px;
      background: linear-gradient(135deg, #4a90d9 0%, #5ba0e6 100%);
      color: #fff;
      text-decoration: none;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeInUp 0.8s ease 0.8s both;
      box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(74, 144, 217, 0.5);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.5rem;
      }
      .features {
        grid-template-columns: 1fr;
      }
      .start-btn {
        padding: 14px 40px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🫧 氣泡排序法</h1>
  <p class="subtitle">用動畫輕鬆理解排序演算法</p>

  <div class="description">
    <h2>📚 歡迎來到互動教學！</h2>
    <p>通過<strong>實時視覺化</strong>和<strong>詳細步驟解析</strong>，從零開始深入理解氣泡排序法的原理。</p>
    <p>調整參數、觀察動畫、追蹤統計數據 — 全面掌握演算法！</p>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🎬</div>
      <div class="feature-text">動畫視覺化</div>
    </div>
    <div class="feature">
      <div class="feature-icon">⏱️</div>
      <div class="feature-text">實時統計</div>
    </div>
    <div class="feature">
      <div class="feature-icon">👣</div>
      <div class="feature-text">逐步執行</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💻</div>
      <div class="feature-text">程式碼示例</div>
    </div>
  </div>

  <a href="bubble_sort.html" class="start-btn">開始教學 →</a>
</div>

</body>
</html></body>
</html>
